# ============================================================
# Skaffold configuration — polydom monorepo (development only)
#
# Dev loop:
#   - Backend: Docker layer cache → fast image rebuilds on source
#     change (1-2s Docker + pod restart + nx build).
#   - Frontend: file sync → Next.js HMR on save (no rebuild).
#   - Tags: fixed "dev" tag, images replaced on rebuild.
#
# Usage:
#   yarn skaffold:dev           Dev mode: port-forward + watch
#   yarn skaffold:dev:debug     Dev mode: limited concurrency (lower memory)
#   yarn skaffold:run           One-shot local deploy
#   yarn skaffold:build         Build images only
# ============================================================
apiVersion: skaffold/v4beta5
kind: Config
metadata:
  name: polydom

build:
  tagPolicy:
    customTemplate:
      template: "dev"
  artifacts:
    - image: polydom/api-gateway
      context: .
      docker:
        dockerfile: apps/nestjs-services/api-gateway/Dockerfile
        target: development

    - image: polydom/auth-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/auth-service/Dockerfile
        target: development

    - image: polydom/user-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/user-service/Dockerfile
        target: development

    - image: polydom/vendor-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/vendor-service/Dockerfile
        target: development

    - image: polydom/event-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/event-service/Dockerfile
        target: development

    - image: polydom/agent-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/agent-service/Dockerfile
        target: development

    - image: polydom/search-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/search-service/Dockerfile
        target: development

    - image: polydom/notification-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/notification-service/Dockerfile
        target: development

    - image: polydom/admin-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/admin-service/Dockerfile
        target: development

    - image: polydom/booking-service
      context: .
      docker:
        dockerfile: apps/nestjs-services/booking-service/Dockerfile
        target: development

    - image: polydom/frontend
      context: .
      docker:
        dockerfile: apps/frontend/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/frontend/**/*.{js,jsx,ts,tsx,css,scss}'
            dest: /app/
          - src: 'libs/**/src/**/*.{ts,tsx}'
            dest: /app/

    - image: polydom/admin-frontend
      context: .
      docker:
        dockerfile: apps/admin-frontend/Dockerfile
        target: development
      sync:
        manual:
          - src: 'apps/admin-frontend/**/*.{js,jsx,ts,tsx,css,scss}'
            dest: /app/
          - src: 'libs/**/src/**/*.{ts,tsx}'
            dest: /app/
  local:
    useBuildkit: true
    push: false
    concurrency: 0

manifests:
  rawYaml:
    - kubernetes/local/namespace.yaml
    - kubernetes/local/secrets.yaml
    - kubernetes/local/postgres-init.yaml
    - kubernetes/local/postgres.yaml
    - kubernetes/local/infrastructure.yaml
    - kubernetes/local/pgadmin.yaml
    - kubernetes/local/services.yaml
    - kubernetes/local/ingress-controller.yaml

deploy:
  kubectl: {}
  statusCheckDeadlineSeconds: 300

portForward:
  - resourceType: service
    resourceName: nginx-ingress
    namespace: polydom-dev
    port: 80
    localPort: 8080
  - resourceType: service
    resourceName: api-gateway
    namespace: polydom-dev
    port: 3000
    localPort: 3000
  - resourceType: service
    resourceName: api-gateway
    namespace: polydom-dev
    port: 9229

    port: 3000
    localPort: 3010
  - resourceType: service
    resourceName: auth-service
    namespace: polydom-dev
    port: 9230
    localPort: 9230
  - resourceType: service
    resourceName: user-service
    namespace: polydom-dev
    port: 3000
    localPort: 3020
  - resourceType: service
    resourceName: user-service
    namespace: polydom-dev
    port: 9231
    localPort: 9231
  - resourceType: service
    resourceName: vendor-service
    namespace: polydom-dev
    port: 3000
    localPort: 3030
  - resourceType: service
    resourceName: vendor-service
    namespace: polydom-dev
    port: 9232
    localPort: 9232
  - resourceType: service

# ============================================================================
# AI Code Governance Platform — Full Development Environment
# Run everything: docker compose up
# ============================================================================

version: '3.8'

services:
  # =========================================================================
  # Infrastructure
  # =========================================================================

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: aigov
      POSTGRES_PASSWORD: aigov123
      POSTGRES_DB: aigov
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tools/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigov"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Application Services
  # =========================================================================

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://aigov:aigov123@postgres:5432/aigov
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: dev-secret-change-in-production
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/backend/node_modules
    working_dir: /app/apps/backend

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
      target: development
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/frontend/node_modules
    working_dir: /app/apps/frontend

volumes:
  postgres_data:

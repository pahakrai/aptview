# This file is no longer used. The LOG_ANALYZER_MCP_CONFIG JSON is now
# auto-generated by LogAnalyzerProcessor from feature flags in
# k8s/mcp-config.yaml. No secret needed.
#
# To enable MCP servers:
#   1. Set LOG_ANALYZER_MCP_ENABLED="true" in k8s/mcp-config.yaml
#   2. Set individual server flags (LOG_ANALYZER_MCP_K8S/AWS/GCP) to "true"
#   3. skaffold run
#
# The backend reads these flags from the ConfigMap and builds the MCP
# connection config at startup — zero manual secret creation required.

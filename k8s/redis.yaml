# ============================================================================
# redis.yaml — Redis Deployment + Service (BullMQ backing store)
# ============================================================================
# Single-instance Redis. For production HA, consider Redis Sentinel or a
# managed Redis service (AWS ElastiCache, GCP Memorystore, etc.).
#
# Apply:
#   kubectl apply -f k8s/redis.yaml
# ============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aigov
  labels:
    app: redis
    app.kubernetes.io/part-of: aigov
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: aigov
  labels:
    app: redis
    app.kubernetes.io/part-of: aigov
    app.kubernetes.io/component: queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/part-of: aigov
        app.kubernetes.io/component: queue
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - redis-cli
                - --raw
                - incr
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - --raw
                - incr
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

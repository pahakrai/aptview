# ============================================================================
# rbac.yaml — Kubernetes RBAC for aigov CodeWhale sandbox runner + MCP servers
# ============================================================================
# Grants the backend service permission to:
#   - Create, get, list, watch, delete Job and Pod resources in codewhale-runner
#   - Get pod logs in the aigov namespace (for MCP Kubernetes server)
#
# Apply:
#   kubectl apply -f k8s/rbac.yaml
# ============================================================================

---
# Namespace for all runner resources
apiVersion: v1
kind: Namespace
metadata:
  name: codewhale-runner

---
# ============================================================================
# AIGOV NAMESPACE RBAC — grants backend SA pod/log access for MCP K8s server
# ============================================================================

---
# Role: allows backend SA to read pod logs in the aigov namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-pod-reader
  namespace: aigov
  labels:
    app.kubernetes.io/part-of: aigov
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]

---
# RoleBinding: binds backend SA to pod-reader role in aigov namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-pod-reader-binding
  namespace: aigov
  labels:
    app.kubernetes.io/part-of: aigov
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: aigov
roleRef:
  kind: Role
  name: backend-pod-reader
  apiGroup: rbac.authorization.k8s.io

---
# ServiceAccount for the backend to assume
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codewhale-runner-sa
  namespace: codewhale-runner

---
# Role: grants Job and Pod management within the namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codewhale-runner-role
  namespace: codewhale-runner
rules:
  # Jobs: create, monitor, and clean up
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]

  # Pods: read logs, watch status, and allow auto-cleanup
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Events: optional — allows the backend to surface K8s events for debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  # Pod logs: required by MCP Kubernetes server for log access
  # Only needed when LOG_ANALYZER_MCP_K8S=true
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
# RoleBinding: binds the ServiceAccount to the Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codewhale-runner-binding
  namespace: codewhale-runner
subjects:
  - kind: ServiceAccount
    name: codewhale-runner-sa
    namespace: codewhale-runner
roleRef:
  kind: Role
  name: codewhale-runner-role
  apiGroup: rbac.authorization.k8s.io

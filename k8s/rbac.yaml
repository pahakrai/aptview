# ============================================================================
# rbac.yaml — Kubernetes RBAC for aigov CodeWhale sandbox runner
# ============================================================================
# Grants the backend service permission to create, get, list, watch, and
# delete Job and Pod resources in the codewhale-runner namespace.
#
# Apply:
#   kubectl apply -f k8s/rbac.yaml
# ============================================================================

---
# Namespace for all runner resources
apiVersion: v1
kind: Namespace
metadata:
  name: codewhale-runner

---
# ServiceAccount for the backend to assume
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codewhale-runner-sa
  namespace: codewhale-runner

---
# Role: grants Job and Pod management within the namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codewhale-runner-role
  namespace: codewhale-runner
rules:
  # Jobs: create, monitor, and clean up
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]

  # Pods: read logs, watch status, and allow auto-cleanup
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Events: optional — allows the backend to surface K8s events for debugging
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---
# RoleBinding: binds the ServiceAccount to the Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codewhale-runner-binding
  namespace: codewhale-runner
subjects:
  - kind: ServiceAccount
    name: codewhale-runner-sa
    namespace: codewhale-runner
roleRef:
  kind: Role
  name: codewhale-runner-role
  apiGroup: rbac.authorization.k8s.io

# ============================================================================
# backend.yaml — NestJS Backend Deployment + Service + ServiceAccount
# ============================================================================
# The backend:
#   1. Serves REST API (port 3000)
#   2. Runs BullMQ workers (audit + decomposition queues via Redis)
#   3. Submits ephemeral K8s Jobs to codewhale-runner namespace
#
# Scaling: increase replicas for more concurrent API capacity.
# BullMQ workers are in-process — each replica runs its own worker pool.
#
# Apply:
#   kubectl apply -f k8s/backend.yaml
# ============================================================================

---
# ServiceAccount for the backend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: aigov
  labels:
    app.kubernetes.io/part-of: aigov
    app.kubernetes.io/component: backend

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aigov
  labels:
    app: backend
    app.kubernetes.io/part-of: aigov
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aigov
  labels:
    app: backend
    app.kubernetes.io/part-of: aigov
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/part-of: aigov
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: backend-sa
      # Init container: run database migrations before the backend starts
      initContainers:
        - name: db-migrate
          image: aigov-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "Running database migrations..."
              cd /app && npx drizzle-kit push --config apps/backend/drizzle.config.ts
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: DATABASE_URL
      containers:
        - name: backend
          image: aigov-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["node"]
          args: ["dist/main"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: aigov-config
            - configMapRef:
                name: aigov-mcp-config
          env:
            # Secrets
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: JWT_SECRET
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: GITHUB_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: DATABASE_URL
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: DEEPSEEK_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: ANTHROPIC_API_KEY
            # -------------------------------------------------------------------
            # MCP Server Configuration (auto-generated from feature flags)
            # The LOG_ANALYZER_MCP_CONFIG JSON is built by the processor from
            # the aigov-mcp-config ConfigMap feature flags. No secret needed.
            # -------------------------------------------------------------------
            # AWS credentials (for CloudWatch MCP server)
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aigov-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          # -------------------------------------------------------------------
          # MCP Credential Volume Mounts (optional)
          # -------------------------------------------------------------------
          volumeMounts:
            - name: kubeconfig
              mountPath: /secrets/kubeconfig
              readOnly: true
            - name: aws-credentials
              mountPath: /secrets/aws
              readOnly: true
            - name: gcp-credentials
              mountPath: /secrets/gcp
              readOnly: true
      # ===================================================================
      # MCP Server Sidecar Containers
      # ===================================================================
      # Each MCP server runs as a sidecar container in the same pod,
      # exposing an HTTP/SSE endpoint on localhost. The backend's McpBridge
      # connects via http://localhost:<port>/sse.
      #
      # These sidecars use the same aigov-backend image (MCP packages are
      # pre-installed in the Dockerfile). They start regardless of feature
      # flags — the backend only connects when flags are "true".
      #
      # Kubernetes MCP Server
      #   Port: 8081  |  SSE endpoint: http://localhost:8081/sse
      - name: mcp-k8s
        image: aigov-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["npx"]
        args: ["-y", "@flux159/mcp-server-kubernetes", "--transport", "sse", "--port", "8081"]
        ports:
          - containerPort: 8081
            name: mcp-k8s
        volumeMounts:
          - name: kubeconfig
            mountPath: /secrets/kubeconfig
            readOnly: true
        env:
          - name: KUBECONFIG
            value: /secrets/kubeconfig/config
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /sse
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3

      # AWS CloudWatch MCP Server
      #   Port: 8082  |  SSE endpoint: http://localhost:8082/sse
      - name: mcp-aws
        image: aigov-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["npx"]
        args: ["-y", "@awslabs/amazon-cloudwatch-logs-mcp", "--transport", "sse", "--port", "8082"]
        ports:
          - containerPort: 8082
            name: mcp-aws
        volumeMounts:
          - name: aws-credentials
            mountPath: /secrets/aws
            readOnly: true
        env:
          - name: AWS_REGION
            valueFrom:
              configMapKeyRef:
                name: aigov-mcp-config
                key: AWS_REGION
                optional: true
          - name: AWS_SHARED_CREDENTIALS_FILE
            value: /secrets/aws/credentials
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /sse
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3

      # Kubetail MCP Server (log aggregation across replicas)
      #   Port: 8084  |  SSE endpoint: http://localhost:8084/sse
      - name: mcp-kubetail
        image: aigov-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["uvx"]
        args: ["kubetail-mcp", "--transport", "sse", "--port", "8084"]
        ports:
          - containerPort: 8084
            name: mcp-kubetail
        volumeMounts:
          - name: kubeconfig
            mountPath: /secrets/kubeconfig
            readOnly: true
        env:
          - name: KUBECONFIG
            value: /secrets/kubeconfig/config
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /sse
            port: 8084
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3

      # GCP Cloud Logging MCP Server
      #   Port: 8083  |  SSE endpoint: http://localhost:8083/sse
      - name: mcp-gcp
        image: aigov-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["npx"]
        args: ["-y", "@swen128/cloud-logging-mcp", "--transport", "sse", "--port", "8083"]
        ports:
          - containerPort: 8083
            name: mcp-gcp
        volumeMounts:
          - name: gcp-credentials
            mountPath: /secrets/gcp
            readOnly: true
        env:
          - name: GOOGLE_APPLICATION_CREDENTIALS
            value: /secrets/gcp/gcp-key.json
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /sse
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
      # -------------------------------------------------------------------
      # MCP Server Credential Volumes
      # -------------------------------------------------------------------
      # These volumes are optional. Only needed when the corresponding
      # LOG_ANALYZER_MCP_* feature flags are set to "true".
      #
      # Kubeconfig: mount your local ~/.kube/config for K8s MCP server access.
      #   kubectl create secret generic kubeconfig --from-file=config=$HOME/.kube/config -n aigov
      #
      # AWS credentials: mount ~/.aws/credentials for CloudWatch MCP server access.
      #   kubectl create secret generic aws-credentials --from-file=credentials=$HOME/.aws/credentials -n aigov
      #
      # GCP credentials: mount your GCP service account key.
      #   kubectl create secret generic gcp-credentials --from-file=gcp-key.json=./gcp-key.json -n aigov
      volumes:
        - name: kubeconfig
          secret:
            secretName: kubeconfig
            optional: true
            items:
              - key: config
                path: config
        - name: aws-credentials
          secret:
            secretName: aws-credentials
            optional: true
            items:
              - key: credentials
                path: credentials
        - name: gcp-credentials
          secret:
            secretName: gcp-credentials
            optional: true
            items:
              - key: gcp-key.json
                path: gcp-key.json
      # Allow the backend to reach Docker registry for pulling runner images
      # if using a private registry, add imagePullSecrets here

---
# RoleBinding: allow backend SA to create Jobs in codewhale-runner
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-sandbox-access
  namespace: codewhale-runner
  labels:
    app.kubernetes.io/part-of: aigov
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: aigov
roleRef:
  kind: Role
  name: codewhale-runner-role
  apiGroup: rbac.authorization.k8s.io

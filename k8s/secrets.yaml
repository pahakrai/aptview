# ============================================================================
# secrets.yaml — Sensitive credentials
# ============================================================================
# DO NOT COMMIT REAL VALUES. Use sealed-secrets or external-secrets in production.
#
# Generate a real JWT secret:
#   openssl rand -base64 64
#
# Apply:
#   kubectl apply -f k8s/secrets.yaml
# ============================================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: aigov-secrets
  namespace: aigov
  labels:
    app.kubernetes.io/part-of: aigov
type: Opaque
stringData:
  # LLM API keys (at least one required)
  DEEPSEEK_API_KEY: ""
  ANTHROPIC_API_KEY: ""

  # JWT signing key — change in production
  JWT_SECRET: "change-me-use-openssl-rand-base64-64"

  # Anthropic API key for Claude Agent SDK (required when AUDIT_MODE=sdk)
  ANTHROPIC_API_KEY: ""

  # GitHub PAT with `contents: read` scope for fetching changed file contents
  GITHUB_TOKEN: ""

  # PostgreSQL connection string
  DATABASE_URL: "postgresql://aigov:aigov123@postgres.aigov.svc.cluster.local:5432/aigov"

  # PostgreSQL individual credentials
  POSTGRES_USER: "aigov"
  POSTGRES_PASSWORD: "aigov123"

  # Redis password (empty if not set)
  REDIS_PASSWORD: ""

  # ---------------------------------------------------------------------------
  # Cloud Credentials for MCP Servers (optional)
  # ---------------------------------------------------------------------------
  # AWS credentials — required only if LOG_ANALYZER_MCP_AWS=true
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # GCP service account key — required only if LOG_ANALYZER_MCP_GCP=true
  # Base64-encode: base64 -w0 gcp-key.json
  GCP_SERVICE_ACCOUNT_KEY: ""

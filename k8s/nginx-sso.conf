# ============================================================================
# nginx-sso.conf — Nginx reverse proxy with JWT validation + header injection
# ============================================================================
# Deploy Nginx in front of your internal services. Nginx validates the JWT
# at the edge and injects plain-text headers (X-User-Id, X-User-Role, ...)
# so downstream services don't need to handle cryptography.
#
# Prerequisites:
#   1. Export the RSA public key from NestJS: openssl rsa -pubout -in private.pem -out sso_public_key.pem
#   2. Mount sso_public_key.pem at /etc/nginx/sso_public_key.pem
#   3. Point auth_jwt_key_file to the mounted path
#
# Apply:
#   kubectl apply -f k8s/nginx-sso.yaml (includes this config as ConfigMap)
# ============================================================================

events {
    worker_connections 1024;
}

http {
    # ---------------------------------------------------------------------------
    # Pull and cache the NestJS SSO public signing key
    # ---------------------------------------------------------------------------
    auth_jwt_key_file /etc/nginx/sso_public_key.pem;

    server {
        listen 80;
        server_name your-internal-domain.com;

        # =======================================================================
        # ZONE A: PUBLIC PASSTHROUGH — Your NestJS SSO App
        # =======================================================================
        # No auth_jwt directive. Allows users to reach the login page
        # and OAuth endpoints freely.
        location /oauth/ {
            proxy_pass http://backend.aigov.svc.cluster.local:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =======================================================================
        # ZONE B: PROTECTED ROUTES — Your existing internal services
        # =======================================================================
        location /v1/documents/ {
            # 1. Cryptographic wall — Nginx decodes the JWT automatically
            auth_jwt "Secure Microservice Cluster Entrance";

            # 2. Attribute mapping — copy JWT claims into plain HTTP headers
            proxy_set_header X-User-Id         $jwt_claim_sub;
            proxy_set_header X-User-Role       $jwt_claim_role;
            proxy_set_header X-User-Department $jwt_claim_dept;
            proxy_set_header X-User-Email      $jwt_claim_email;
            proxy_set_header X-User-Clearance  $jwt_claim_clearanceLevel;

            # 3. Cleanse — strip the JWT so the internal service doesn't see it
            proxy_set_header Authorization "";

            # 4. Dispatch to the internal service
            proxy_pass http://document-service:4000/;
        }

        location /v1/print/ {
            auth_jwt "Secure Microservice Cluster Entrance";
            proxy_set_header X-User-Id         $jwt_claim_sub;
            proxy_set_header X-User-Role       $jwt_claim_role;
            proxy_set_header X-User-Department $jwt_claim_dept;
            proxy_set_header Authorization "";
            proxy_pass http://print-service:5000/;
        }

        # Generic catch-all for any internal service behind SSO
        location /v1/internal/ {
            auth_jwt "Secure Microservice Cluster Entrance";
            proxy_set_header X-User-Id         $jwt_claim_sub;
            proxy_set_header X-User-Role       $jwt_claim_role;
            proxy_set_header X-User-Department $jwt_claim_dept;
            proxy_set_header Authorization "";
            proxy_pass http://internal-services:8000/;
        }
    }
}

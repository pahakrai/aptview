# ============================================================================
# mcp-config.yaml — MCP (Model Context Protocol) server configuration
# ============================================================================
# Configures which MCP servers the Log Analyzer connects to for cloud-native
# log access. Each MCP server runs as a child process of the backend via
# Node.js child_process.spawn() with stdio transport.
#
# ZERO MANUAL STEPS REQUIRED. Set the flags below to "true" and Skaffold
# handles everything. The backend auto-generates the connection config from
# these feature flags — no secrets to create, no JSON to paste.
#
# Feature flags:
#   LOG_ANALYZER_MCP_ENABLED    — "true" to enable MCP server connections (master switch)
#   LOG_ANALYZER_MCP_K8S        — "true" to enable Kubernetes MCP server
#   LOG_ANALYZER_MCP_AWS        — "true" to enable AWS CloudWatch MCP server
#   LOG_ANALYZER_MCP_GCP        — "true" to enable GCP Cloud Logging MCP server
#
# Cloud configuration:
#   AWS_REGION                   — AWS region for CloudWatch log queries
#   GCP_PROJECT_ID               — Google Cloud project ID for logging queries
#
# The LOG_ANALYZER_MCP_CONFIG JSON is auto-generated by LogAnalyzerProcessor
# at startup from these flags. The actual credential files are mounted as
# volumes (see backend.yaml for kubeconfig/aws/gcp volume mounts).
#
# Quick enable (K8s only):
#   1. Set LOG_ANALYZER_MCP_ENABLED="true" and LOG_ANALYZER_MCP_K8S="true"
#   2. Create kubeconfig secret:
#      kubectl create secret generic kubeconfig \
#        --from-file=config=$HOME/.kube/config -n aigov
#   3. skaffold run
#
# Apply:
#   kubectl apply -f k8s/mcp-config.yaml
# ============================================================================

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aigov-mcp-config
  namespace: aigov
  labels:
    app.kubernetes.io/part-of: aigov
    app.kubernetes.io/component: mcp-servers
data:
  # ---------------------------------------------------------------------------
  # Feature Flags — set to "true" to enable each MCP server
  # ---------------------------------------------------------------------------
  LOG_ANALYZER_MCP_ENABLED: "false"

  # Kubernetes MCP — needs kubeconfig + pod/log RBAC (see rbac.yaml)
  LOG_ANALYZER_MCP_K8S: "false"
  # Default namespace to search when no namespace is specified
  LOG_ANALYZER_MCP_K8S_NAMESPACE: "aigov"

  # AWS CloudWatch MCP — needs AWS credentials (see secrets.yaml)
  LOG_ANALYZER_MCP_AWS: "false"
  AWS_REGION: "us-east-1"

  # GCP Cloud Logging MCP — needs GCP service account key (see secrets.yaml)
  LOG_ANALYZER_MCP_GCP: "false"
  # GCP project ID — required for log queries
  GCP_PROJECT_ID: ""

  # ---------------------------------------------------------------------------
  # MCP Server Endpoints (SSE transport — sidecars on localhost)
  # ---------------------------------------------------------------------------
  # Each MCP server runs as a sidecar container in the same pod, exposing
  # an HTTP/SSE endpoint. The backend's McpBridge connects via these URLs.
  # Ports match the sidecar containerPort in backend.yaml.
  MCP_K8S_URL: "http://localhost:8081/sse"
  MCP_AWS_URL: "http://localhost:8082/sse"
  MCP_GCP_URL: "http://localhost:8083/sse"

  # Fallback to stdio transport for local dev (no K8s):
  #   MCP_{SOURCE}_TRANSPORT: "stdio"
  #   MCP_{SOURCE}_COMMAND: "npx"
  #   MCP_{SOURCE}_ARGS: "-y @flux159/mcp-server-kubernetes"
  MCP_TRANSPORT_MODE: "sse"

  # ---------------------------------------------------------------------------
  # Credential File Paths (mounted as volumes — see backend.yaml)
  # ---------------------------------------------------------------------------
  KUBECONFIG_PATH: "/secrets/kubeconfig/config"
  AWS_CREDENTIALS_PATH: "/secrets/aws/credentials"
  GCP_CREDENTIALS_PATH: "/secrets/gcp/gcp-key.json"
# ============================================================================
# frontend.yaml — React + Vite Frontend Deployment + Service
# ============================================================================
# Serves static assets via nginx with API proxy to backend.
#
# Apply:
#   kubectl apply -f k8s/frontend.yaml
# ============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: aigov
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigov
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: aigov
  labels:
    app: frontend
    app.kubernetes.io/part-of: aigov
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: aigov
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: aigov-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
